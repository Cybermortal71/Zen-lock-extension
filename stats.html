<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenLock - 时间统计</title>
  <style>
    :root {
      --primary: #4a90d9;
      --primary-light: #e8f0fe;
      --primary-dark: #3a7bc8;
      --bg: #f5f8fc;
      --card-bg: #ffffff;
      --text: #2c3e50;
      --text-secondary: #7f8c9b;
      --border: #dce6f0;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(74, 144, 217, 0.10);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    /* --- 头部 --- */
    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 4px;
    }

    /* --- 日期导航 --- */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .date-nav .btn-sm {
      padding: 8px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .date-nav .btn-sm:hover {
      background: var(--primary-light);
      border-color: var(--primary);
    }

    .date-nav input[type="date"] {
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      text-align: center;
      background: var(--card-bg);
    }

    .date-nav input[type="date"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    /* --- 概览卡片 --- */
    .summary-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .summary-card {
      flex: 1;
      min-width: 140px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 16px;
      text-align: center;
    }

    .summary-card .label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .summary-card .value {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
    }

    /* --- 图表容器 --- */
    .chart-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 8px 12px;
      margin-bottom: 16px;
    }

    #chartCanvas {
      width: 100%;
      height: 500px;
      display: block;
    }

    /* --- tooltip --- */
    .chart-tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(44, 62, 80, 0.92);
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.6;
      white-space: nowrap;
      z-index: 10;
      display: none;
    }

    /* --- 空状态 --- */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state .msg {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* --- 链接 --- */
    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: var(--primary);
      font-size: 13px;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
    button:active, .btn:active, .btn-sm:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>时间流瀑布图</h1>
      <p id="dateLabel">加载中…</p>
    </header>

    <!-- 日期导航 -->
    <div class="date-nav">
      <button class="btn-sm" id="prevDayBtn">← 上一日</button>
      <input type="date" id="datePicker">
      <button class="btn-sm" id="nextDayBtn">下一日 →</button>
      <button class="btn-sm" id="todayBtn" style="border-color: var(--primary); color: var(--primary);">今天</button>
    </div>

    <!-- 概览 -->
    <div class="summary-row" id="summaryRow">
      <div class="summary-card">
        <div class="label">总浏览时长</div>
        <div class="value" id="totalTime">--</div>
      </div>
      <div class="summary-card">
        <div class="label">访问网站数</div>
        <div class="value" id="domainCount">--</div>
      </div>
      <div class="summary-card">
        <div class="label">访问次数</div>
        <div class="value" id="sessionCount">--</div>
      </div>
      <div class="summary-card">
        <div class="label">累计解锁次数</div>
        <div class="value" id="unlockCount">--</div>
      </div>
    </div>

    <!-- 图表 -->
    <div class="chart-card" id="chartCard" style="position:relative;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:12px;color:var(--text-secondary);">拖动选取时间范围可放大</span>
        <button class="btn-sm" id="resetZoomBtn" style="display:none;">↺ 重置缩放</button>
      </div>
      <canvas id="chartCanvas"></canvas>
      <div class="chart-tooltip" id="chartTooltip"></div>
    </div>

    <!-- AI 周报 -->
    <div class="chart-card" id="reportCard">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn-sm" id="generateReportBtn" style="font-size:14px;padding:10px 22px;background:var(--primary);color:#fff;border:none;font-weight:600;">📊 生成周报</button>
        <span style="font-size:12px;color:var(--text-secondary);">基于最近7天浏览数据，由 AI 生成总结</span>
      </div>
      <div id="reportResult" style="display:none;margin-top:16px;padding:20px;background:var(--primary-light);border-radius:10px;font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;"></div>
    </div>

    <!-- 空状态（初始隐藏） -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="icon">📊</div>
      <div class="msg">还没有浏览数据。正常使用浏览器，这里会自动生成你的时间分布图。<br><small style="color:var(--text-secondary);">提示：确保黑名单网站已设置，Zenlock 会默默在后台记录。</small></div>
    </div>

    <!-- 底部链接 -->
    <div class="back-link">
      <a href="#" id="optionsLink">⚙️ 前往黑名单设置</a>
    </div>
  </div>

  <script src="stats.js"></script>
</body>
</html>
