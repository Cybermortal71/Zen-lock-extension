<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>制作者的话 - ZenLock</title>
  <style>
    :root {
      --primary: #4a90d9;
      --bg: #f5f8fc;
      --text: #3a3f47;
      --text-secondary: #7f8c9b;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 700px; width: 100%; }
    header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
    }
    .back-btn {
      background: none; border: 1.5px solid var(--text-secondary);
      border-radius: 8px; padding: 6px 14px; font-size: 13px;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    }
    .back-btn:hover { border-color: var(--primary); color: var(--primary); }
    header h1 { font-size: 22px; font-weight: 700; color: var(--primary); flex: 1; }
    .content {
      background: #fff; border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(74,144,217,0.08);
      padding: 36px 32px; font-size: 15px; line-height: 2;
      color: var(--text); white-space: pre-wrap;
    }
    .content .signature {
      display: block; text-align: right; margin-top: 2em;
      font-size: 13px; color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <button class="back-btn" id="backBtn">← 返回</button>
      <h1>🌿 制作者的话</h1>
    </header>
    <div class="content" id="content"></div>
  </div>
  <script src="author-note.js"></script>
</body>
</html>
